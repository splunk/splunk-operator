    name: v4
    schema:
      openAPIV3Schema:
        description: |-
          PostgresClusterClass is the Schema for the postgresclusterclasses API.
          PostgresClusterClass defines a reusable template and policy for postgres cluster provisioning.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PostgresClusterClassSpec defines the desired state of PostgresClusterClass.
              PostgresClusterClass is immutable after creation - it serves as a template for Cluster CRs.
            properties:
              cnpg:
                description: |-
                  CNPG contains CloudNativePG-specific configuration and policies.
                  Only used when Provisioner is "postgresql.cnpg.io"
                  These settings CANNOT be overridden in PostgresCluster CR (platform policy).
                properties:
                  connectionPooler:
                    description: |-
                      ConnectionPooler contains PgBouncer connection pooler configuration.
                      When enabled, creates RW and RO pooler deployments for clusters using this class.
                    properties:
                      config:
                        additionalProperties:
                          type: string
                        description: |-
                          Config contains PgBouncer configuration parameters.
                          Passed directly to CNPG Pooler spec.pgbouncer.parameters.
                          See: https://cloudnative-pg.io/docs/1.28/connection_pooling/#pgbouncer-configuration-options
                        type: object
                      instances:
                        default: 3
                        description: |-
                          Instances is the number of PgBouncer pod replicas.
                          Higher values provide better availability and load distribution.
                        format: int32
                        maximum: 10
                        minimum: 1
                        type: integer
                      mode:
                        default: transaction
                        description: Mode defines the connection pooling strategy.
                        enum:
                        - session
                        - transaction
                        - statement
                        type: string
                    type: object
                  primaryUpdateMethod:
                    default: switchover
                    description: |-
                      PrimaryUpdateMethod determines how the primary instance is updated.
                      "restart" - tolerate brief downtime (suitable for development)
                      "switchover" - minimal downtime via automated failover (production-grade)

                      NOTE: When using "switchover", ensure clusterConfig.instances > 1.
                      Switchover requires at least one replica to fail over to.
                    enum:
                    - restart
                    - switchover
                    type: string
                type: object
              config:
                default: {}
                description: |-
                  PostgresClusterConfig contains cluster-level configuration.
                  These settings apply to PostgresCluster infrastructure.
                  Can be overridden in PostgresCluster CR.
                properties:
                  connectionPoolerEnabled:
                    default: false
                    description: |-
                      ConnectionPoolerEnabled controls whether PgBouncer connection pooling is deployed.
                      When true, creates RW and RO pooler deployments for clusters using this class.
                      Can be overridden in PostgresCluster CR.
                    type: boolean
                  instances:
                    default: 1
                    description: |-
                      Instances is the number of database instances (1 primary + N replicas).
                      Single instance (1) is suitable for development.
                      High availability requires at least 3 instances (1 primary + 2 replicas).
                    format: int32
                    maximum: 10
                    minimum: 1
                    type: integer
                  pgHBA:
                    description: |-
                      PgHBA contains pg_hba.conf host-based authentication rules.
                      Defines client authentication and connection security (cluster-wide).
                      Example: ["hostssl all all 0.0.0.0/0 scram-sha-256"]
                    items:
                      type: string
                    type: array
                  postgresVersion:
                    default: "18"
                    description: |-
                      PostgresVersion is the PostgreSQL version (major or major.minor).
                      Examples: "18" (latest 18.x), "18.1" (specific minor), "17", "16"
                    pattern: ^[0-9]+(\.[0-9]+)?$
                    type: string
                  postgresqlConfig:
                    additionalProperties:
                      type: string
                    description: |-
                      PostgreSQLConfig contains PostgreSQL engine configuration parameters.
                      Maps to postgresql.conf settings (cluster-wide).
                      Example: {"max_connections": "200", "shared_buffers": "2GB"}
                    type: object
                  resources:
                    description: |-
                      Resources defines CPU and memory requests/limits per instance.
                      All instances in the cluster have the same resources.
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                  storage:
                    anyOf:
                    - type: integer
                    - type: string
                    default: 50Gi
                    description: |-
                      Storage is the size of persistent volume for each instance.
                      Cannot be decreased after cluster creation (PostgreSQL limitation).
                      Recommended minimum: 10Gi for production viability.
                      Example: "50Gi", "100Gi", "1Ti"
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                type: object
              provisioner:
                description: |-
                  Provisioner identifies which database provisioner to use.
                  Currently supported: "postgresql.cnpg.io" (CloudNativePG)
                type: string
            required:
            - provisioner
            type: object
            x-kubernetes-validations:
            - message: cnpg config can only be set when provisioner is postgresql.cnpg.io
              rule: '!has(self.cnpg) || self.provisioner == ''postgresql.cnpg.io'''
            - message: cnpg.connectionPooler must be set when config.connectionPoolerEnabled
                is true
              rule: '!has(self.config) || !has(self.config.connectionPoolerEnabled)
                || !self.config.connectionPoolerEnabled || (has(self.cnpg) && has(self.cnpg.connectionPooler))'
          status:
            description: PostgresClusterClassStatus defines the observed state of
              PostgresClusterClass.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the PostgresClusterClass state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                description: |-
                  Phase represents the current phase of the PostgresClusterClass.
                  Valid phases: "Ready", "Invalid"
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
