apiVersion: enterprise.splunk.com/v4
kind: Database
metadata:
  name: test-database  # Same name as 01-valid-database.yaml
  namespace: default
spec:
  clusterRef:
    name: different-cluster  # CHANGED! Should fail with: "clusterRef is immutable"
  databases:
    - name: kvstore
      extensions:
        - pg_stat_statements
        - pgcrypto
      deletionPolicy: Retain
    - name: analytics
      extensions:
        - pg_trgm
      deletionPolicy: Delete
    - name: metrics
