---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: postgresclusters.enterprise.splunk.com
spec:
  group: enterprise.splunk.com
  names:
    kind: PostgresCluster
    listKind: PostgresClusterList
    plural: postgresclusters
    singular: postgrescluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.class
      name: Class
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v4
    schema:
      openAPIV3Schema:
        description: PostgresCluster is the Schema for the postgresclusters API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PostgresClusterSpec defines the desired state of PostgresCluster.
              Validation rules ensure immutability of Class, and that Storage and PostgresVersion can only be set once and cannot be removed or downgraded.
            properties:
              class:
                description: This field is IMMUTABLE after creation.
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: class is immutable
                  rule: self == oldSelf
              connectionPooler:
                description: ConnectionPooler contains connection pooler settings
                  for this cluster.
                properties:
                  enabled:
                    default: false
                    description: |-
                      Enabled controls whether PgBouncer connection pooling is deployed for this cluster.
                      When set, takes precedence over the class-level connectionPooler.enabled value.
                    type: boolean
                type: object
              instances:
                description: Instances overrides the number of PostgreSQL instances
                  from ClusterClass.
                format: int32
                maximum: 10
                minimum: 1
                type: integer
              pgHBA:
                default: []
                description: |-
                  PgHBA contains pg_hba.conf host-based authentication rules.
                  Defines client authentication and connection security (cluster-wide).
                  Maps to pg_hba.conf settings.
                  Default empty array prevents panic.
                  Example: ["hostssl all all 0.0.0.0/0 scram-sha-256"]
                items:
                  type: string
                type: array
              postgresVersion:
                default: "18"
                description: |-
                  PostgresVersion is the PostgreSQL version (major or major.minor).
                  Examples: "18" (latest 18.x), "18.1" (specific minor), "17", "16"
                pattern: ^[0-9]+(\.[0-9]+)?$
                type: string
              postgresqlConfig:
                additionalProperties:
                  type: string
                default: {}
                description: |-
                  PostgreSQL overrides PostgreSQL engine parameters from ClusterClass.
                  Maps to postgresql.conf settings.
                  Default empty map prevents panic.
                  Example: {"shared_buffers": "128MB", "log_min_duration_statement": "500ms"}
                type: object
              resources:
                description: Resources overrides CPU/memory resources from ClusterClass.
                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This field depends on the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              storage:
                anyOf:
                - type: integer
                - type: string
                description: |-
                  Storage overrides the storage size from ClusterClass.
                  Example: "5Gi"
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
            required:
            - class
            type: object
            x-kubernetes-validations:
            - message: Postgres version cannot be downgraded
              rule: '!has(oldSelf.postgresVersion) || semver(self.postgresVersion,
                true).compareTo(semver(oldSelf.postgresVersion, true)) >= 0'
            - message: Storage size cannot be removed and can only be increased
              rule: '!has(oldSelf.storage) || (has(self.storage) && quantity(self.storage).compareTo(quantity(oldSelf.storage))
                >= 0)'
          status:
            description: PostgresClusterStatus defines the observed state of PostgresCluster.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the PostgresCluster's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              connectionPoolerStatus:
                description: |-
                  ConnectionPoolerStatus contains the observed state of the connection pooler.
                  Only populated when connection pooler is enabled in the PostgresClusterClass.
                properties:
                  enabled:
                    description: Enabled indicates whether pooler is active for this
                      cluster.
                    type: boolean
                type: object
              phase:
                description: |-
                  Phase represents the current phase of the PostgresCluster.
                  Values: "Pending", "Provisioning", "Failed", "Ready", "Deleting"
                type: string
              provisionerRef:
                description: |-
                  ProvisionerRef contains reference to the provisioner resource managing this PostgresCluster.
                  Right now, only CNPG is supported.
                properties:
                  apiVersion:
                    description: API version of the referent.
                    type: string
                  fieldPath:
                    description: |-
                      If referring to a piece of an object instead of an entire object, this string
                      should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
                      For example, if the object reference is to a container within a pod, this would take on a value like:
                      "spec.containers{name}" (where "name" refers to the name of the container that triggered
                      the event) or if no container name is specified "spec.containers[2]" (container with
                      index 2 in this pod). This syntax is chosen only to have some well-defined way of
                      referencing a part of an object.
                    type: string
                  kind:
                    description: |-
                      Kind of the referent.
                      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                    type: string
                  name:
                    description: |-
                      Name of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                  namespace:
                    description: |-
                      Namespace of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                    type: string
                  resourceVersion:
                    description: |-
                      Specific resourceVersion to which this reference is made, if any.
                      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                    type: string
                  uid:
                    description: |-
                      UID of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                    type: string
                type: object
                x-kubernetes-map-type: atomic
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
