# Default configuration WITH webhook enabled (opt-in)
# Use this overlay to deploy the operator WITH validation webhook
# Requires cert-manager to be installed in the cluster

namespace: splunk-operator

namePrefix: splunk-operator-

commonLabels:
  name: splunk-operator

bases:
- ../crd
- ../rbac
- ../persistent-volume
- ../service
- ../manager
# [WEBHOOK] Enabled for opt-in webhook deployment
- ../webhook
# [CERTMANAGER] Required for webhook TLS
- ../certmanager
- ../default/metrics_service.yaml

patchesStrategicMerge:
- ../default/manager_webhook_patch.yaml
- ../default/webhookcainjection_patch.yaml

vars:
- name: CERTIFICATE_NAMESPACE
  objref:
    kind: Certificate
    group: cert-manager.io
    version: v1
    name: serving-cert
  fieldref:
    fieldpath: metadata.namespace
- name: CERTIFICATE_NAME
  objref:
    kind: Certificate
    group: cert-manager.io
    version: v1
    name: serving-cert
- name: SERVICE_NAMESPACE
  objref:
    kind: Service
    version: v1
    name: webhook-service
  fieldref:
    fieldpath: metadata.namespace
- name: SERVICE_NAME
  objref:
    kind: Service
    version: v1
    name: webhook-service

patches:
- target:
    kind: Deployment
    name: controller-manager
  patch: |-
    - op: add
      path: /spec/template/spec/containers/0/env
      value: 
      - name: WATCH_NAMESPACE
        value: WATCH_NAMESPACE_VALUE
      - name: RELATED_IMAGE_SPLUNK_ENTERPRISE
        value: SPLUNK_ENTERPRISE_IMAGE
      - name: OPERATOR_NAME
        value: splunk-operator
      - name: SPLUNK_GENERAL_TERMS
        value: SPLUNK_GENERAL_TERMS_VALUE
      - name: ENABLE_WEBHOOKS
        value: "true"
      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
- path: ../default/manager_metrics_patch.yaml
  target:
    kind: Deployment
