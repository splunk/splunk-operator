# This rule is not used by the project splunk-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to platform.splunk.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: splunk-operator
    app.kubernetes.io/managed-by: kustomize
  name: platform-platformconfig-viewer-role
rules:
- apiGroups:
  - platform.splunk.com
  resources:
  - platformconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - platform.splunk.com
  resources:
  - platformconfigs/status
  verbs:
  - get
